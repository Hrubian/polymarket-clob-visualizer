<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Polymarket CLOB visualizer</title>
    <style>
        html, body {
          margin: 0;
          padding: 0;
          overflow: hidden; /* optional: removes scrollbars */
          background: #1e1e1e; /* match canvas background */
        }

        #container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }
        canvas {
            position: absolute;
            inset: 0;
        }
        #overlay {
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="container">
        <canvas id="gl"></canvas>
        <canvas id="overlay"></canvas>
    </div>
    <script src="https://unpkg.com/regl/dist/regl.min.js"></script>
    <script type="module" src="init.js"></script>
</body>
</html>
